services:
  - type: web
    name: financial-anomaly-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    rootDir: backend
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX_NAME
        value: fraud-cases-v2
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: DEBUG
        value: "false"
      - key: REFLECTION_MAX_RETRIES
        value: "2"
      - key: ALLOWED_ORIGINS
        value: "https://financial-anomaly-agent.vercel.app,http://localhost:3000"
    healthCheckPath: /health
